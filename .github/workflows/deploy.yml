name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ vars.IMAGE_TAG }}
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/my-priorities/prioritization-app:${IMAGE_TAG}
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Copy stack file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: docker-compose-stack.yml
          target: /home/deploy/docker-compose-stack

      - name: Deploy stack
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          IMAGE_TAG: ${{ vars.IMAGE_TAG }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          SSL_HOST: ${{ vars.SSL_HOST }}
          TRAEFIK_CERT_RESOLVER: ${{ vars.TRAEFIK_CERT_RESOLVER }}
          ALLOWED_EMAIL_1: ${{ secrets.ALLOWED_EMAIL_1 }}
          ALLOWED_EMAIL_2: ${{ secrets.ALLOWED_EMAIL_2 }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_PAT,IMAGE_TAG,DEPLOY_HOST,SSL_HOST,TRAEFIK_CERT_RESOLVER,ALLOWED_EMAIL_1,ALLOWED_EMAIL_2,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            export IMAGE=ghcr.io/${{ github.repository_owner }}/my-priorities/prioritization-app:${IMAGE_TAG}
            export DEPLOY_HOST="${DEPLOY_HOST}"
            export SSL_HOST="${SSL_HOST}"
            export TRAEFIK_CERT_RESOLVER="${TRAEFIK_CERT_RESOLVER:-mytlschallenge}"
            export ALLOWED_EMAIL_1="${ALLOWED_EMAIL_1}"
            export ALLOWED_EMAIL_2="${ALLOWED_EMAIL_2}"
            export GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID}"
            export GOOGLE_CLIENT_SECRET="${GOOGLE_CLIENT_SECRET}"
            echo "$GHCR_PAT" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            docker stack deploy -c /home/deploy/docker-compose-stack/docker-compose-stack.yml prioritiesstack --with-registry-auth
            docker service update --force prioritiesstack_my-priorities
