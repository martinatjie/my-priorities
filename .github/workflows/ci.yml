name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore PrioritizationApp.sln

      - name: Build
        run: dotnet build PrioritizationApp.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test PrioritizationApp.sln --no-build --configuration Release --verbosity normal
